name: Tools
options:
  bundleIdPrefix: com.lessquo
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Tools:
    type: application
    platform: macOS
    sources:
      - path: Tools
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lessquo.tools
        PRODUCT_NAME: Tools
        INFOPLIST_FILE: Tools/Info.plist
        CODE_SIGN_ENTITLEMENTS: Tools/Tools.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
    entitlements:
      path: Tools/Tools.entitlements
