name: Tools
options:
  bundleIdPrefix: com.lessquo
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"

packages:
  mlx-audio-swift:
    url: https://github.com/Blaizzy/mlx-audio-swift
    branch: main
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: 2.31.3
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface
    from: 0.9.0

targets:
  Tools-iOS:
    type: application
    platform: iOS
    configFiles:
      Debug: Local.xcconfig
      Release: Local.xcconfig
    sources:
      - path: Tools/Shared
      - path: Tools/iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lessquo.tools
        PRODUCT_NAME: Tools
        INFOPLIST_FILE: Tools/iOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: Tools/iOS/Tools.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
    dependencies:
      - package: swift-huggingface
        product: HuggingFace
    entitlements:
      path: Tools/iOS/Tools.entitlements
      properties:
        keychain-access-groups:
          - $(AppIdentifierPrefix)$(PRODUCT_BUNDLE_IDENTIFIER)

  Tools-macOS:
    type: application
    platform: macOS
    configFiles:
      Debug: Local.xcconfig
      Release: Local.xcconfig
    sources:
      - path: Tools/Shared
      - path: Tools/macOS
    preBuildScripts:
      - script: |
          if [ "$CONFIGURATION" = "Debug" ]; then
              tccutil reset Accessibility "$PRODUCT_BUNDLE_IDENTIFIER" || true
          fi
        name: Reset Accessibility Permission
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lessquo.tools
        PRODUCT_NAME: Tools
        INFOPLIST_FILE: Tools/macOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: Tools/macOS/Tools.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        COMBINE_HIDPI_IMAGES: YES
        CODE_SIGN_STYLE: Automatic
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
    dependencies:
      - package: mlx-audio-swift
        product: MLXAudioCore
      - package: mlx-audio-swift
        product: MLXAudioSTT
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: swift-huggingface
        product: HuggingFace
    entitlements:
      path: Tools/macOS/Tools.entitlements
      properties:
        keychain-access-groups:
          - $(AppIdentifierPrefix)$(PRODUCT_BUNDLE_IDENTIFIER)
